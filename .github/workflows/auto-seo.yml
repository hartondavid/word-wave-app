name: Auto SEO post

on:
  schedule:
    # Zilnic la 06:00 UTC (ajustează cron după nevoie)
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/auto-seo.yml"
      - "scripts/auto_seo.py"

jobs:
  generate-seo:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-seo.txt

      - name: Install dependencies
        run: pip install -r requirements-seo.txt

      - name: Run SEO generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/auto_seo.py

      - name: Commit and push new post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(seo): articol puzzle zilnic generat automat"
            git push
          fi
