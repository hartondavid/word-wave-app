name: Auto Dual Language Content

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9,15 * * *"

concurrency:
  group: auto-dual-lang-content
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dual-lang.txt

      - name: Install dependencies
        run: pip install -r requirements-dual-lang.txt

      - name: Generate EN and RO articles
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_content.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/en content/ro
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "content: add EN/RO daily articles (auto)"
            git push
          fi
