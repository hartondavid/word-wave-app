# O singură pereche / zi: același articol în EN + RO (content/en + content/ro, același slug).
name: Auto Dual Language Content

on:
  workflow_dispatch:
  schedule:
    # O dată pe zi, 07:00 UTC (~09:00 RO iarna). Schimbă cron după fusul dorit.
    - cron: "0 7 * * *"

concurrency:
  group: auto-dual-lang-content
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dual-lang.txt

      - name: Install dependencies
        run: pip install -r requirements-dual-lang.txt

      # Opțional (repo → Settings → Actions → Variables):
      #   GEMINI_MODEL, GEMINI_MODEL_FALLBACK — prioritate în lanț.
      #   GEMINI_EXTRA_MODELS — ID-uri separate prin virgulă.
      #   GEMINI_DISCOVER_MODELS — 1 sau true = adaugă modele din API (list).
      - name: Generate EN and RO articles
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GEMINI_MODEL_FALLBACK: ${{ vars.GEMINI_MODEL_FALLBACK }}
          GEMINI_EXTRA_MODELS: ${{ vars.GEMINI_EXTRA_MODELS }}
          GEMINI_DISCOVER_MODELS: ${{ vars.GEMINI_DISCOVER_MODELS }}
        run: python scripts/generate_content.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/en content/ro
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "content: daily article EN+RO (same slug, auto)"
            git push
          fi
